<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anúncios Sem Flags — ix-puppeteer</title>
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22100%22 height=%22100%22><text y=%220.9em%22 font-size=%2290%22>🏷️</text></svg>">
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Principal -->
  <link rel="stylesheet" href="/css/style.css">
  
  <style>
    body {
      background: var(--background-primary, #0c0f1d);
      color: var(--text-primary, #e2e8f0);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-y: auto !important;
    }

    .blacklist-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: rgba(17, 24, 39, 0.4);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color, rgba(255, 255, 255, 0.06));
      width: 100%;
      box-sizing: border-box;
    }

    .blacklist-title-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .blacklist-title-group h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .blacklist-subtitle {
      display: none;
    }

    .blacklist-container {
      padding: 15px 20px;
      max-width: 100% !important;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
      flex: 1;
    }

    .search-filter-card {
      background: rgba(17, 24, 39, 0.25);
      border: 1px solid var(--border-color, rgba(255, 255, 255, 0.06));
      border-radius: 12px;
      padding: 12px 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 2fr 2fr 1.5fr auto;
      gap: 16px;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary, #94a3b8);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-input {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
    }

    .filter-input:focus {
      border-color: var(--accent, #6366f1);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .filter-select {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus {
      border-color: var(--accent, #6366f1);
    }

    .ad-title-cell-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ad-details-btn {
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="blacklist-header-bar">
    <div class="blacklist-title-group">
      <div style="display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:8px; background:rgba(59, 130, 246, 0.12); color:#3b82f6;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </div>
      <div>
        <h1>Anúncios Sem Flags</h1>
        <div class="blacklist-subtitle">Anúncios sem nenhuma classificação ou flag aplicada</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn btn-secondary" onclick="window.close();" style="font-size:12px; padding:6px 12px; display:flex; align-items:center; gap:6px; cursor:pointer;">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Fechar Aba
      </button>
    </div>
  </header>

  <!-- Container Principal -->
  <main class="blacklist-container">
    
    <!-- Filtros -->
    <article class="search-filter-card">
      <div class="filter-grid">
        <div class="filter-group">
          <label class="filter-label" for="filterKeyword">Filtrar por Keyword</label>
          <input type="text" class="filter-input" id="filterKeyword" placeholder="Pesquisar termo..." />
        </div>
        <div class="filter-group">
          <label class="filter-label" for="filterDomain">Filtrar por Domínio</label>
          <input type="text" class="filter-input" id="filterDomain" placeholder="Pesquisar domínio..." />
        </div>
        <div class="filter-group">
          <label class="filter-label" for="orderBy">Ordenar por</label>
          <select class="filter-select" id="orderBy">
            <option value="recent">Anúncios mais recentes</option>
            <option value="repetitions">Maior quantidade repetida</option>
          </select>
        </div>
        <div class="filter-group" style="justify-content: flex-end;">
          <button class="btn btn-primary" id="btnApplyFilters" style="padding: 8px 16px; font-size:13px;">🔍 Filtrar</button>
        </div>
      </div>
    </article>

    <!-- Tabela de Anúncios -->
    <article class="card">
      <div class="card-body" style="padding:0;">
        <div id="adsTableContainer" style="overflow-x:auto;">
          <div class="profile-empty-state" id="adsEmptyState">
            <div class="empty-icon">📢</div>
            <div class="empty-title">Carregando anúncios sem flags...</div>
          </div>
        </div>

        <!-- Paginação -->
        <div id="adsPagination" style="display:none; margin:16px 24px; padding-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
          <span id="adsPaginationInfo" style="font-size:13px; color:var(--text-secondary);"></span>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-secondary" id="btnAdsPrevPage" disabled>← Anterior</button>
            <button class="btn btn-secondary" id="btnAdsNextPage">Próxima →</button>
          </div>
        </div>
      </div>
    </article>

  </main>

  <!-- Modal Títulos Históricos -->
  <div id="adTitlesModalOverlay" class="modal-overlay">
    <div class="modal-dialog" style="max-width:520px;">
      <div class="modal-header">
        <div style="display:flex; align-items:center; gap:8px;">
          <span style="font-size:18px;">📋</span>
          <span class="modal-title">Títulos Registrados</span>
        </div>
        <button class="modal-close-btn" id="btnCloseAdTitles">✕</button>
      </div>
      <div class="modal-body" style="padding-top:10px;">
        <div style="margin-bottom:12px;">
          <strong id="adTitlesDomainLabel" style="font-size:14px; color:var(--accent); word-break:break-all;">dominio.com.br</strong>
        </div>
        <ul class="ad-titles-list" id="adTitlesListContainer" style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto;">
          <!-- Dinâmico -->
        </ul>
        <div style="display:flex; justify-content:flex-end; margin-top:16px;">
          <button class="btn btn-secondary" id="btnCloseAdTitlesOk" style="font-size:13px; padding:6px 18px;">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/sem-flags-page.js"></script>

</body>
</html>
